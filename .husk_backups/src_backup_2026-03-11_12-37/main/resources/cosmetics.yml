# ====================================
# GorvaxCore — Cosméticos (B13)
# ====================================
# Tipos disponíveis: WALK_PARTICLE, KILL_PARTICLE, ARROW_TRAIL, CHAT_TAG, KILL_EFFECT
# source: como o cosmético é desbloqueado (achievement, shop, crate, vip, admin)
# permission: permissão opcional (se não definida, usa o source)

cosmetics:

  # ──────────────────────────────────
  # Partículas ao caminhar
  # ──────────────────────────────────
  walk_flame:
    type: WALK_PARTICLE
    name: "§6🔥 Caminho de Fogo"
    particle: FLAME
    count: 3
    speed: 0.02
    offset_y: 0.1
    source: achievement
    description: "Deixa rastros de fogo por onde passa."

  walk_heart:
    type: WALK_PARTICLE
    name: "§c❤ Corações"
    particle: HEART
    count: 2
    speed: 0.0
    offset_y: 0.3
    source: shop
    price: 5000
    description: "Espalha corações pelo caminho."

  walk_enchant:
    type: WALK_PARTICLE
    name: "§d✨ Encantamento"
    particle: ENCHANTMENT_TABLE
    count: 5
    speed: 0.05
    offset_y: 0.5
    source: crate
    description: "Letras mágicas flutuam ao seu redor."

  walk_note:
    type: WALK_PARTICLE
    name: "§a🎵 Musical"
    particle: NOTE
    count: 1
    speed: 0.0
    offset_y: 0.5
    source: shop
    price: 3000
    description: "Notas musicais no ar!"

  walk_end:
    type: WALK_PARTICLE
    name: "§5🌀 Portal do End"
    particle: PORTAL
    count: 8
    speed: 0.05
    offset_y: 0.2
    source: achievement
    description: "Partículas misteriosas do End."

  walk_snow:
    type: WALK_PARTICLE
    name: "§f❄ Nevasca"
    particle: SNOWFLAKE
    count: 4
    speed: 0.03
    offset_y: 0.4
    source: shop
    price: 4000
    description: "Deixa um rastro de neve."

  # ──────────────────────────────────
  # Trails de projétil (flechas)
  # ──────────────────────────────────
  trail_magic:
    type: ARROW_TRAIL
    name: "§d✨ Trilha Mágica"
    particle: CRIT_MAGIC
    count: 5
    speed: 0.0
    source: achievement
    description: "Flechas deixam trilha de brilho mágico."

  trail_flame:
    type: ARROW_TRAIL
    name: "§6🔥 Trilha de Fogo"
    particle: FLAME
    count: 3
    speed: 0.01
    source: shop
    price: 4000
    description: "Flechas pegam fogo no ar."

  trail_soul:
    type: ARROW_TRAIL
    name: "§3💀 Trilha das Almas"
    particle: SOUL_FIRE_FLAME
    count: 4
    speed: 0.01
    source: crate
    description: "Flechas com chamas espectrais."

  trail_water:
    type: ARROW_TRAIL
    name: "§9💧 Trilha Aquática"
    particle: DRIPPING_WATER
    count: 3
    speed: 0.0
    source: shop
    price: 3000
    description: "Gotas d'água seguem suas flechas."

  # ──────────────────────────────────
  # Tags no chat
  # ──────────────────────────────────
  tag_vip:
    type: CHAT_TAG
    name: "§a[✦ VIP]"
    display: "§a[✦ VIP] "
    source: vip
    permission: "gorvax.cosmetic.tag.vip"
    description: "Tag exclusiva para VIPs."

  tag_elite:
    type: CHAT_TAG
    name: "§b[⚡ ELITE]"
    display: "§b[⚡ ELITE] "
    source: vip
    permission: "gorvax.cosmetic.tag.elite"
    description: "Tag premium de elite."

  tag_legend:
    type: CHAT_TAG
    name: "§6[🐉 LENDÁRIO]"
    display: "§6[🐉 LENDÁRIO] "
    source: crate
    description: "Tag lendária obtida por sorte."

  tag_warrior:
    type: CHAT_TAG
    name: "§c[⚔ GUERREIRO]"
    display: "§c[⚔ GUERREIRO] "
    source: achievement
    description: "Desbloqueada ao matar 100 jogadores."

  tag_builder:
    type: CHAT_TAG
    name: "§e[🏗 CONSTRUTOR]"
    display: "§e[🏗 CONSTRUTOR] "
    source: achievement
    description: "Desbloqueada ao colocar 50.000 blocos."

  # ──────────────────────────────────
  # Kill Effects (visual ao matar)
  # ──────────────────────────────────
  effect_lightning:
    type: KILL_EFFECT
    name: "§e⚡ Relâmpago"
    effect: LIGHTNING
    source: achievement
    description: "Um raio cai no local da vítima."

  effect_firework:
    type: KILL_EFFECT
    name: "§d🎆 Fogos de Artifício"
    effect: FIREWORK
    source: shop
    price: 8000
    description: "Fogos explodem ao eliminar alguém."

  effect_explosion:
    type: KILL_EFFECT
    name: "§c💥 Onda de Choque"
    effect: EXPLOSION
    source: crate
    description: "Explosão visual dramática."

  # ──────────────────────────────────
  # Kill Particles (partículas ao matar)
  # ──────────────────────────────────
  kill_totem:
    type: KILL_PARTICLE
    name: "§e🌟 Totem Divino"
    particle: TOTEM_OF_UNDYING
    count: 30
    source: achievement
    description: "Efeito de totem ao eliminar."

  kill_lava:
    type: KILL_PARTICLE
    name: "§6🌋 Chuva de Lava"
    particle: LAVA
    count: 15
    source: shop
    price: 6000
    description: "Partículas de lava na vítima."

  kill_dragon:
    type: KILL_PARTICLE
    name: "§5🐲 Sopro do Dragão"
    particle: DRAGON_BREATH
    count: 20
    source: crate
    description: "Sopro do dragão consome a vítima."
