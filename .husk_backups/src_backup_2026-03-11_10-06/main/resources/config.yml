# GorvaxCore Configuration
# v1.0.0

# B33 — Versão da configuração (NÃO edite manualmente)
# Usado pelo sistema de migração automática para detectar atualizações pendentes
config_version: 1

global:
  contador_reinos: 0

# B18 — Configuração de Storage
# Tipos suportados: yaml (padrão), sqlite, mysql
storage:
  type: yaml
  sqlite:
    file: gorvax.db
  mysql:
    host: localhost
    port: 3306
    database: gorvax
    username: root
    password: ''
    pool_size: 10

economy:
  claim_blocks:
    initial: 100
    cost_per_block: 0.5
    sell_return: 0.3

# Configurações de Reinos
kingdoms:
  creation_cost: 5000.0
  upkeep_enabled: true
  visit_cost: 500.0       # Custo em $ para /reino visitar
  visit_cooldown: 60       # Cooldown em segundos entre visitas
  visit_warmup: 5          # Tempo de espera antes do teleporte (cancelável ao mover)
  invite_expire: 60        # Tempo em segundos para o convite expirar

  # B5.1 — Imposto diário sobre súditos
  tax:
    resident_daily: 50.0   # Taxa diária cobrada de cada súdito
    max_rate: 500.0        # Limite máximo configurável pelo Rei
    debt_days_expel: 3     # Dias sem pagar antes de ser expulso

  # B5.2 — Upkeep do reino (custo fixo por chunk)
  upkeep:
    per_chunk: 10.0        # Custo por chunk claimado por dia
    warning_days: 7        # Dias sem pagar até entrar em "Decadência"
    unclaim_days: 14       # Dias sem pagar até liberação de claims

  # B5.4 — Limite de membros por nível
  max_members:
    base: 5                # Membros base (incluindo Rei)
    per_level: 3           # Membros extras por nível do reino
    slot_cost: 10000.0     # Custo para comprar +1 slot via banco

# B36 — Manutenção de Terras Normais (Claims Pessoais)
# Sistema independente do upkeep de reinos — cobra do saldo pessoal do dono
claims:
  upkeep_enabled: false          # Desativado por padrão (ativar quando desejado)
  upkeep:
    per_chunk: 5.0               # Custo por chunk claimado por dia (menor que reinos)
    warning_days: 10             # Dias sem pagar até aviso de expiração iminente
    unclaim_days: 21             # Dias sem pagar até claim ser removido automaticamente

# Reset do End
end_reset:
  enabled: true
  dragon_reset_time: "03:00"      # Horário do reset diário do dragão (24h)
  dimension_reset_time: "04:00"   # Horário do reset semanal do End
  dimension_reset_day: "MONDAY"   # Dia da semana para o reset do End (MONDAY, TUESDAY, etc)
  warning_intervals: [60, 30, 10, 5, 2]  # Minutos antes do reset para avisar

# Mensagens
messages:
  prefix: "§b[Gorvax] §r"
  warning_dragon: "§5§l[Dragão] §dO selo do End enfraquece... O Dragão renascerá em {tempo}!"
  warning_end: "§4§l[Apocalipse] §cO tecido da realidade do The End se desfará em {tempo}!"
  warning_kick: "§4§l[Expulsão] §cA dimensão está colapsando! Fujam agora!"
  success_dragon: "§5§l[Renascimento] §dO Ender Dragon retornou ao seu trono!"
  success_end: "§a§l[Gênesis] §2O The End foi purificado e renasceu das cinzas!"

# B6 — Scoreboard / HUD
scoreboard:
  enabled: false                 # Desativado — TAB plugin gerencia o HUD/sidebar via PlaceholderAPI
  update_interval: 40            # Intervalo de atualização da sidebar (em ticks, 40 = 2 seg)
  default_enabled: true          # Se novos jogadores entram com o HUD ligado por padrão

# B7 — Diplomacia
diplomacy:
  alliance_expire: 60            # Segundos para proposta de aliança expirar
  max_allies: 3                  # Máximo de alianças simultâneas
  max_enemies: 5                 # Máximo de inimizades simultâneas
  enemy_cooldown: 3600           # Cooldown (segundos) para cancelar inimizade
  ally_pvp_disabled: true        # PvP desativado entre aliados
  ally_access_enabled: true      # Acesso automático em terrenos aliados
  enemy_pvp_forced: true         # PvP forçado entre inimigos

# B8 — Chat Expandido
chat:
  local_radius: 200              # Alcance do canal local em blocos
  format: "{kingdom_tag} {rank} {player}: {message}"
  rank_icons:
    king: "Rei"
    vice: "Vice"
    noble: "Nobre"
    resident: "Sudito"
  channel_colors:
    global: "§f"
    kingdom: "§b"
    alliance: "§a"
    local: "§e"
    trade: "§6"
    nation: "§d"                # B19 — Cor do canal de nação

  # B9 — Anti-Spam (Rate Limiter)
  rate_limit:
    messages: 3                  # Máximo de mensagens permitidas na janela
    seconds: 5                   # Janela de tempo em segundos

  # B9 — Filtro de Palavras
  blocked_words:
    - "(?i)palavr[aã]o"          # Regex: palavrão/palavrao (case insensitive)
    # Adicione padrões regex conforme necessário
    # - "(?i)xingamento"

  filter:
    action: "censor"             # Ação: block (bloqueia), censor (substitui por ***), mute (muta temporariamente)
    mute_duration: 300           # Duração do mute em segundos (apenas para action: mute)

# B9 — Visualização de Claims Melhorada
visualization:
  inspection_duration: 15      # Duração da inspeção com graveto (segundos)
  particle_spacing: 3          # Espaçamento entre partículas na borda (blocos)
  border_sound: true

# ============================================================
# B12 — Conquistas e Títulos
# ============================================================
achievements:
  enabled: true
  check_interval: 6000  # Ticks — verificação periódica (5 minutos)
  fireworks_on_unlock: true
  broadcast_on_unlock: false

# B10 — Log de Auditoria
audit:
  enabled: true
  max_entries: 1000             # Máximo de entradas no audit_log.yml
  save_interval: 6000           # Intervalo de save em ticks (6000 = 5 min)
  market_history_per_player: 50 # Transações guardadas por jogador no histórico

# B11 — Boss Events e Calendário
boss:
  schedule:
    enabled: true
    events:
      - "SATURDAY 20:00 rei_gorvax"
      - "WEDNESDAY 21:00 indrax_abissal"
      - "SUNDAY 19:00 vulgathor"
    warnings: [30, 10, 5, 1]    # Minutos antes do evento para enviar avisos

  raid:
    enabled: true
    min_players: 3              # Mínimo de jogadores no raio para iniciar
    player_radius: 100          # Raio em blocos para detectar jogadores
    wave_cooldown: 30           # Segundos entre ondas
    loot_multiplier_per_wave: 0.2  # +20% loot por onda sobrevivida
    waves:
      - "skulkor"
      - "zarith"
      - "kaldur"
      - "vulgathor"
      - "rei_gorvax"

  seasonal:
    enabled: true
    events:
      natal:
        boss: "kaldur"
        name_override: "§c§l❄ Kaldur Natalino"
        start: "12-20"
        end: "01-05"
        loot_lore_prefix: "§c❄ §fEdição Natalina"
      halloween:
        boss: "skulkor"
        name_override: "§6§l🎃 Skulkor das Sombras"
        start: "10-25"
        end: "11-05"
        loot_lore_prefix: "§6🎃 §fEdição Halloween"

# ---- B13: OUTPOSTS (POSTOS AVANÇADOS) ----
outposts:
  cost_multiplier: 3.0       # Custo de blocos = area × multiplicador
  min_distance: 200           # Distância mínima do claim principal (blocos)
  max_per_level:
    1: 0    # Nível 1-2: sem outpost
    3: 1    # Nível 3-4: 1 outpost
    5: 2    # Nível 5-6: 2 outposts
    7: 3    # Nível 7+: 3 outposts

# ---- B14: LEILÃO GLOBAL ----
auction:
  enabled: true
  default_duration: 300        # 5 minutos (em segundos)
  max_duration: 3600            # 1 hora máximo
  min_price: 10.0               # Preço mínimo de abertura
  bid_increment: 1.0            # Incremento mínimo sobre lance atual
  tax_percent: 5.0              # Taxa sobre venda final
  anti_snipe_seconds: 15        # Extensão anti-snipe
  broadcast_last_seconds: 30    # Broadcast nos últimos X segundos
  max_active_per_player: 3      # Máximo de leilões ativos por jogador

# ---- B14: HISTÓRICO DE PREÇOS ----
price_history:
  enabled: true
  snapshot_interval: 6000       # Ticks entre snapshots (5 minutos)
  retention_hours: 24           # Horas de retenção de dados
  trend_hours: 6                # Horas usadas no cálculo de tendência

# ---- B15: SISTEMA DE GUERRA ----
war:
  enabled: true
  declaration_cost: 10000.0          # Custo do banco do reino para declarar guerra
  preparation_hours: 24              # Horas de preparação antes da guerra começar
  max_duration_days: 7               # Duração máxima da guerra em dias
  points_per_kill: 1                 # Pontos por kill de membro inimigo
  points_per_death: -1               # Pontos perdidos por morte
  spoils_bank_percent: 25.0          # % do banco do perdedor transferido ao vencedor
  loser_debuff_days: 3               # Dias de debuff para o perdedor (sem buffs de reino)
  outpost_capture_enabled: true      # Vencedor pode tomar 1 outpost do perdedor
  cooldown_days: 30                  # Dias de cooldown antes de poder declarar guerra ao mesmo reino
  min_kingdom_level: 3               # Nível mínimo do reino para poder declarar guerra
  min_members: 3                     # Mínimo de membros para poder declarar guerra
  broadcast_interval_minutes: 30     # Intervalo de broadcast do placar durante guerra
  surrender_penalty_percent: 10.0    # % extra de custo na rendição (além dos espólios normais)

# ---- B16: INTEGRAÇÃO COM MAPA WEB ----
webmap:
  enabled: true
  update_interval: 1200              # Ticks entre atualizações (1200 = 60s)
  marker_set_label: "GorvaxCore — Reinos"
  colors:
    kingdom: "#00AA00"               # Verde para reinos
    outpost: "#FF8800"               # Laranja para outposts
    personal: "#5555FF"              # Azul para claims pessoais
  show_personal_claims: false        # Exibir claims pessoais (não-reino) no mapa

# ---- B17: FEATURES SOCIAIS ----
mail:
  max_unread: 20                       # Máximo de cartas não lidas por jogador
  max_message_length: 200              # Caracteres máximos por carta

vote:
  expire_hours: 24                     # Horas até a votação expirar

bounty:
  enabled: true
  min_value: 100.0                     # Valor mínimo de bounty
  max_value: 1000000.0                 # Valor máximo de bounty
  same_kingdom_allowed: false          # Permitir bounty em membros do mesmo reino

# ---- B19: SISTEMA DE NAÇÕES ----
nations:
  creation_cost: 50000.0              # Custo para criar uma nação
  invite_expire: 60                   # Segundos até o convite expirar
  max_kingdoms: 10                    # Máximo de reinos por nação
  visit_cost_reduction: 0.5           # Desconto de visita entre reinos da mesma nação (0.5 = 50%)
  buffs:
    level_2: "SPEED"                  # Buff ao atingir nível 2
    level_3: "DAMAGE_RESISTANCE"      # Buff ao atingir nível 3

# ---- B1: PROTEÇÃO ANTI-EXPLOIT ----
protection:
  block_wither_spawn: true             # Impedir spawn de Wither dentro de claims
  block_crystal_placement: true        # Impedir colocação de End Crystal em claims alheios
  block_crystal_damage: true           # Proteger blocos de claims contra explosão de Crystal
  block_tnt_from_outside: true         # Rastrear TNT e bloquear se origina fora do claim
  block_bed_explosions: true           # Proteger claims contra explosões de cama/âncora
  redstone_tick_limit: 100             # Máximo de ticks de redstone por chunk por ciclo (0 = desativado)
  redstone_reset_interval: 20          # Ticks para resetar contadores de redstone (20 = 1 segundo)
  block_chorus_teleport: true          # Impedir Chorus Fruit para dentro de claims alheios

# ---- B2: SISTEMA DE COMBATE ----
combat:
  tag_duration: 15                     # Segundos de combat tag após PvP
  blocked_commands:                    # Comandos bloqueados durante combat tag
    - home
    - tpa
    - spawn
    - warp
    - rtp
    - back
    - logout
  block_gui_in_combat: true            # Bloquear abertura de GUIs durante combate

  logger_enabled: true                 # Spawnar NPC Villager ao deslogar em combate
  logger_duration: 15                  # Segundos que o NPC permanece vivo

  spawn_protection: 5                  # Segundos de invulnerabilidade pós-respawn

  killstreak:
    broadcast_interval: 5              # A cada N kills, broadcast no chat
    auto_bounty_at: 10                 # Streak para bounty automática (0 = desativado)
    auto_bounty_value: 500.0           # Valor da bounty automática
    titles:                            # Títulos temporários por kill streak
      5: "§c⚔ Imparável"
      10: "§6⚔ Lendário"
      20: "§4⚔ Deus da Guerra"

# ---- B3: SISTEMA DE DUELOS ----
duel:
  enabled: true
  challenge_expire: 30                 # Segundos para aceitar/recusar desafio
  countdown: 5                         # Segundos de contagem regressiva
  max_duration: 300                    # Duração máxima em segundos (5 minutos = empate)
  max_distance: 50                     # Distância máxima para desafiar (blocos)
  min_bet: 100.0                       # Aposta mínima em $
  max_bet: 100000.0                    # Aposta máxima em $
  tax_percent: 5.0                     # Taxa sobre o prêmio do vencedor (%)
  keep_inventory: true                 # Manter inventário do perdedor

# ---- B4: TUTORIAL INTERATIVO + WELCOME KIT ----
tutorial:
  enabled: true
  completion_reward_money: 500.0       # Recompensa em $ ao completar o tutorial
  completion_reward_blocks: 200        # Blocos extra ao completar o tutorial
  welcome_kit:                         # Itens dados no primeiro login
    - GOLDEN_SHOVEL:1
    - IRON_SHOVEL:1
    - STICK:1
    - SHIELD:1
    - COOKED_BEEF:16
    - LEATHER_HELMET:1
    - LEATHER_CHESTPLATE:1
    - LEATHER_LEGGINGS:1
    - LEATHER_BOOTS:1
    - STONE_SWORD:1

# ---- B5: DAILY REWARDS & LOGIN STREAK ----
daily_rewards:
  enabled: true
  min_hours: 20              # Mínimo de horas entre resgates
  max_hours: 48              # Máximo de horas antes de resetar streak
  day_1:
    money: 100
  day_2:
    claim_blocks: 50
  day_3:
    money: 250
  day_4:
    claim_blocks: 100
  day_5:
    money: 500
  day_6:
    claim_blocks: 200
  day_7:
    money: 1000
    title: "§e⭐ Fiel"

# ---- B7: LEADERBOARDS & RANKINGS ----
leaderboard:
  refresh_interval_minutes: 5    # Intervalo de atualização do cache em minutos
  top_size: 10                    # Quantidade de posições no ranking

# ---- B8: INTEGRAÇÃO DISCORD (WEBHOOK) ----
# Ponte unidirecional Minecraft → Discord via webhook.
# Configure a URL do webhook em Definições do Canal > Integrações > Webhooks.
discord:
  enabled: false
  webhook_url: ""
  chat_sync: true
  alerts:
    boss_spawn: true
    war_declare: true
    raid_start: true
    killstreak: true
    achievement_rare: true
  # Threshold mínimo de killstreak para alertar no Discord
  killstreak_threshold: 5

# B10 — Custom Items (Armas e Armaduras Lendárias)
custom_items:
  enabled: true
  # Intervalo em ticks para reaplicar efeitos passivos de armadura (60 = 3s)
  passive_effect_interval: 60

# B11 — Mini-Bosses por Bioma
# Configurações detalhadas em mini_bosses.yml
mini_bosses:
  enabled: true

# ---- B12: SISTEMA DE CRATES / KEYS ----
# Configurações detalhadas dos tipos de crate em crates.yml
crates:
  enabled: true
  # Material do bloco que abre o menu de crates (jogador clica)
  block_material: ENDER_CHEST
  # Restringir abertura apenas na área do spawn
  spawn_only: true
  # Raio do spawn para considerar "área de spawn"
  spawn_radius: 50

# ---- B14-VIP: LOJA VIP & RANKS PREMIUM ----
vip:
  enabled: true
  # Grupos LuckPerms correspondentes a cada tier
  groups:
    vip: "vip"
    vip_plus: "vip-plus"
    elite: "elite"
    lendario: "lendario"
  # Benefícios por tier (sem vantagem PvP direta — EULA)
  tiers:
    vip:
      display_name: "§a[✦ VIP]"
      extra_claim_blocks: 500
      extra_homes: 2
      monthly_keys:
        raro: 1
      market_discount_percent: 0
    vip_plus:
      display_name: "§b[✦ VIP+]"
      extra_claim_blocks: 1500
      extra_homes: 5
      monthly_keys:
        raro: 2
        lendario: 1
      market_discount_percent: 5
    elite:
      display_name: "§6[⚡ ELITE]"
      extra_claim_blocks: 3000
      extra_homes: 10
      monthly_keys:
        raro: 3
        lendario: 1
      market_discount_percent: 10
    lendario:
      display_name: "§d[🐉 LENDÁRIO]"
      extra_claim_blocks: 5000
      extra_homes: 15
      monthly_keys:
        raro: 3
        lendario: 2
      market_discount_percent: 15
  # Dia do mês para distribuir keys mensais (1 = dia 1)
  monthly_key_day: 1

# ---- B15: BATTLE PASS SAZONAL ----
# Configurações detalhadas de temporada, rewards e XP em battlepass.yml
battle_pass:
  enabled: true

# ---- B18: SISTEMA DE REPUTAÇÃO / KARMA ----
karma:
  enabled: true
  kill_penalty: 3                      # Karma perdido ao matar jogador
  boss_reward: 5                       # Karma ganho ao ajudar em boss
  market_reward: 1                     # Karma ganho ao vender no mercado
  quest_reward: 2                      # Karma ganho ao completar quest
  hero_discount: 5.0                   # % de desconto no mercado para Heróis (karma >= 100)
  hero_claim_discount: 5.0             # % de desconto em claims para Heróis
  bounty_threshold: -100               # Karma para ativar bounty automática
  auto_bounty_value: 500.0             # Valor da bounty automática para Procurados
  reveal_interval_minutes: 5           # Intervalo (minutos) para revelar localização de Procurados

# ---- SISTEMA DE RANKS GRATUITOS ----
ranks:
  enabled: true
  check_interval: 6000                  # Ticks entre verificações automáticas (5 min)
  requirements:
    explorador:
      playtime_hours: 10                 # 10 horas jogadas
      blocks_broken: 500                 # 500 blocos quebrados
      kills: 0
      bosses_killed: 0
      balance: 2000.0                    # R$2.000 de saldo
      kingdom_level: 0
    guerreiro:
      playtime_hours: 30                 # 30 horas jogadas
      blocks_broken: 0
      kills: 50                          # 50 kills PvP
      bosses_killed: 5                   # 5 bosses participados
      balance: 10000.0                   # R$10.000
      kingdom_level: 0
    lendario:
      playtime_hours: 80                 # 80 horas jogadas
      blocks_broken: 0
      kills: 200                         # 200 kills PvP
      bosses_killed: 20                  # 20 bosses participados
      balance: 50000.0                   # R$50.000
      kingdom_level: 3                   # Reino nível 3+

# ---- B25: TELEPORTE ALEATÓRIO (/rtp) ----
rtp:
  cooldown_seconds: 600                  # Cooldown entre usos (10 minutos)
  max_radius: 5000                       # Raio máximo do spawn
  min_radius: 500                        # Raio mínimo do spawn
  max_attempts: 10                       # Tentativas para encontrar local seguro
  unsafe_blocks:                         # Blocos onde não teleportar
    - LAVA
    - FIRE
    - SOUL_FIRE
    - MAGMA_BLOCK
    - CACTUS
    - SWEET_BERRY_BUSH
    - POWDER_SNOW
    - WITHER_ROSE

# ---- B37: HUB DE TELEPORTES & BÚSSOLA ----
teleport_hub:
  enabled: true
  compass_give_on_join: true
  compass_slot: 8                        # Slot 9 da hotbar (0-indexed)
  cooldowns:
    spawn: 30                            # Segundos
    rtp: 300                             # 5 minutos
    kingdom_home: 30                     # 30 segundos
    kingdom_visit: 60                    # Controlado pelo config existente
  warmups:
    spawn: 5                             # Segundos (cancelado se mover)
    rtp: 3
    kingdom_home: 3
  combat_check: true                     # Bloquear TP se em combat tag
