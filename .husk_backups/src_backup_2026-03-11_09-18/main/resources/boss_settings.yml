# ################################################
# SINERGIA DE ALIANÇA (Cross-Boss Support)
# ################################################
alliance_synergy:
  enabled: true
  max_distance: 200.0       # Distância máxima para efeitos de apoio (blocos) — era 50.0
  response_cooldown_ms: 1500  # Cooldown entre respostas (evita spam) — era 3000

  # Feixe permanente conectando Gorvax ↔ Indrax (visível enquanto ambos vivos)
  persistent_beam:
    enabled: true
    interval_seconds: 3        # Intervalo entre desenhos do feixe (segundos)
    particle_spacing: 1.5      # Distância entre partículas no feixe (blocos)
    end_rod_count: 3           # Partículas END_ROD por ponto
    soul_fire_count: 2         # Partículas SOUL_FIRE_FLAME por ponto
    portal_count: 2            # Partículas PORTAL por ponto

  # Aura de ressonância — cada boss ganha partículas extras do tema do aliado
  resonance_aura:
    enabled: true
    interval_seconds: 2        # Intervalo entre pulsos de ressonância (segundos)
    radius: 4.0                # Raio da aura ao redor de cada boss
    # Gorvax recebe partículas sombrias (tema Indrax)
    gorvax_sculk_count: 12
    gorvax_end_rod_count: 6
    gorvax_reverse_portal_count: 8
    # Indrax recebe partículas de fogo (tema Gorvax)
    indrax_flame_count: 12
    indrax_soul_fire_count: 6
    indrax_lava_count: 4

# ################################################
# EVENTOS ATMOSFÉRICOS (Clima Dinâmico por Boss)
# ################################################
atmospheric_events:
  gorvax_fury:
    enabled: true
    target_time: 18000                # Meia-noite
    thunder_interval_ticks: 70        # Trovão a cada ~3.5s
    thunder_distance_min: 20          # Distância mínima do raio (blocos)
    thunder_distance_max: 60          # Distância máxima do raio (blocos)
    cloud_particles: 5                # Partículas de nuvem no céu
  indrax_eclipse:
    enabled: true
    target_time: 18000                # Noite profunda
    night_vision_duration: 60         # Ticks do pulso de NightVision
    night_vision_interval: 200        # Intervalo entre pulsos (ticks)
    smoke_particles: 8                # Fumaça no horizonte
  temporal_rupture:
    enabled: true
    proximity_distance: 80.0          # Distância para ativar (blocos)
    switch_min_seconds: 30            # Intervalo mínimo entre alternâncias
    switch_max_seconds: 45            # Intervalo máximo
    fade_duration_ticks: 80           # Duração do fade (4 segundos)
    portal_particles: 200             # Partículas PORTAL no momento da troca
    cloud_particles: 100              # Partículas CLOUD no momento da troca
    rumble_interval_ticks: 100        # Som de rumble periódico (ticks)
    title_fade_in: 10                 # Ticks de fade-in do título
    title_stay: 60                    # Ticks que o título fica na tela
    title_fade_out: 20                # Ticks de fade-out do título
