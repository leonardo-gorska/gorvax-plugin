# ============================================================
# QUESTS DE LORE — Missões narrativas permanentes (multi-step)
# Não resetam como diárias/semanais. Progresso persistente.
# Cada step usa o mesmo QuestType do sistema existente.
# Ao completar cada step, um diálogo é exibido ao jogador.
# ============================================================
lore_quests:
  ferreiro_ancestral:
    name: "§6§lO Ferreiro Ancestral"
    description: "Descubra a história de Ashvale e do Rei Gorvax."
    icon: ANVIL
    steps:
      - type: MINE_BLOCK
        target: ANCIENT_DEBRIS
        amount: 2
        dialogue: "§7§oFerreiro Ancestral: §f'Esses restos... são do Pilar de Chamas. Tragam-me mais para que eu possa forjar a verdade.'"
      - type: KILL_MOB
        target: WITHER_SKELETON
        amount: 10
        dialogue: "§7§oFerreiro Ancestral: §f'Os servos do Rei eram Wither Skeletons. Eliminá-los prova sua coragem e revela o passado.'"
      - type: BOSS_PARTICIPATE
        target: ANY
        amount: 1
        dialogue: "§7§oFerreiro Ancestral: §f'Você enfrentou as bestas e sobreviveu. Agora sabe a verdade sobre Ashvale.'"
    reward:
      money: 5000
      karma: 10
      title: "§6[⚒ Herdeiro de Ashvale]"
      book: ascensao_gorvax

  segredo_glacius:
    name: "§b§lO Segredo de Glacius"
    description: "Investigue o que aconteceu com o Monastério de Glacius."
    icon: PACKED_ICE
    steps:
      - type: MINE_BLOCK
        target: BLUE_ICE
        amount: 16
        dialogue: "§3§oMonge Gelado: §f'Este gelo azul... é dos picos onde Kaldur nasceu. O monastério está perto.'"
      - type: KILL_MOB
        target: STRAY
        amount: 15
        dialogue: "§3§oMonge Gelado: §f'Os Strays eram arqueiros de Glacius — congelados e transformados. Liberte-os.'"
      - type: KILL_MOB
        target: ANY
        amount: 50
        dialogue: "§3§oMonge Gelado: §f'Você provou que é forte o bastante. A verdade sobre Glacius é sua.'"
    reward:
      money: 4000
      karma: 8
      title: "§b[❄ Discípulo de Glacius]"
      book: queda_indrax

  fragmentos_etheris:
    name: "§5§lFragmentos de Étheris"
    description: "Reúna os fragmentos perdidos da Biblioteca de Étheris."
    icon: ENDER_EYE
    steps:
      - type: KILL_MOB
        target: ENDERMAN
        amount: 10
        dialogue: "§5§oSábio de Étheris: §f'Os Endermen carregam fragmentos dimensionais. Recupere-os.'"
      - type: MINE_BLOCK
        target: OBSIDIAN
        amount: 32
        dialogue: "§5§oSábio de Étheris: §f'Obsidiana é a fundação da Biblioteca. Com isso posso reconstruir a porta.'"
      - type: BOSS_PARTICIPATE
        target: ANY
        amount: 2
        dialogue: "§5§oSábio de Étheris: §f'Ao enfrentar as bestas, a profecia se revela: fogo sem vazio é destruição, vazio sem fogo é esquecimento.'"
    reward:
      money: 7500
      karma: 15
      title: "§5[✦ Guardião dos Fragmentos]"
      book: profecia
