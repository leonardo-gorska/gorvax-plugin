# ########################################################################## #
#                   GORVAX CORE - CUSTOM ITEMS LENDÁRIOS                     #
#        Sistema de itens customizados com efeitos on-hit e on-equip         #
# ########################################################################## #
#
# Formato de cada item:
#   base: Material vanilla (NETHERITE_SWORD, DIAMOND_BOOTS, etc.)
#   name: Nome customizado com cores (§)
#   lore: Lista de strings de lore
#   enchants:
#     ENCHANT_NAME: nível
#   attributes:
#     ATTRIBUTE_NAME: valor (ADD_NUMBER no slot correspondente)
#   on_hit_effects: (somente para armas — aplica ao atacar)
#     - type: PotionEffectType
#       duration: ticks de duração
#       amplifier: nível do efeito (0 = I, 1 = II, etc.)
#       chance: chance em % (0-100)
#   passive_effects: (somente para armadura — aplica enquanto equipado)
#     - type: PotionEffectType
#       amplifier: nível do efeito
#   source: Descrição de como obter (informativo, exibido na lore)
#

