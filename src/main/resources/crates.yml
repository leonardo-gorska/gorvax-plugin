# ============================================================
# CRATES FÍSICAS NO SPAWN
# Blocos em coordenadas específicas que abrem diretamente um tipo de crate.
# Configure as coordenadas reais do seu spawn.
# Se esta seção estiver vazia ou ausente, o CrateListener usa o comportamento
# padrão (qualquer Ender Chest abre o menu de seleção).
# ============================================================
physical_crates:
  - type: comum
    world: world
    x: 5
    y: 70
    z: 5
  - type: raro
    world: world
    x: 10
    y: 70
    z: 5
  - type: lendario
    world: world
    x: 15
    y: 70
    z: 5
  - type: sazonal
    world: world
    x: 20
    y: 70
    z: 5
