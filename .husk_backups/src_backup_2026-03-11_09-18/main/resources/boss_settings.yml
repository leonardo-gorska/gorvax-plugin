# ########################################################################## #
#                   GORVAX CORE - CONFIGURAÇÃO DE BOSSES                     #
# ########################################################################## #

# Dialogues de lore — linhas faladas pelos bosses ao spawnar e ao matar jogadores.
# spawn_dialogue: lista, 1 é escolhida aleatoriamente ao spawnar.
# kill_player: enviada ao jogador morto (privada).

bosses:
  # ################################################
  # REI GORVAX - O Soberano do Nether
  # ################################################
  rei_gorvax:
    nome: "&6&lREI GORVAX"
    hp: 15000.0
    normal_damage: 28.0 # Dano do ataque corpo a corpo

    dialogues:
      spawn:
        - "§6§lREI GORVAX: §eVocês ousam construir sem minha permissão?! O Pilar de Chamas me despertou!"
        - "§6§lREI GORVAX: §eEu marchei sozinho até o Pilar e absorvi o poder das chamas. Agora, vocês arderão!"
        - "§6§lREI GORVAX: §eMeu trono foi forjado nos restos do Pilar rachado. Venham... se ousarem."
      kill_player:
        - "§6§lREI GORVAX: §eVocê deveria ter ficado no seu canto, mortal. Este mundo é meu."
        - "§6§lREI GORVAX: §eAssim caíram os guerreiros de Ashvale. Assim cairá qualquer um que me desafiar."

    skills:
      # Tempo base entre ataques especiais (milissegundos)
      cooldown_base: 5000
      # Tempo entre ataques quando o boss está com fúria (<25% HP)
      cooldown_rage: 2500
      
      # Salto Esmagador (Esmaga jogadores próximos)
      salto:
        dano: 40.0
        raio: 14
        
      # Chuva de Meteoros (Explosões por yield)
      meteor:
        explosao_yield: 3.5 # Tamanho da explosão (reduzido para menos griefing)
        
      # Prisão de Almas (Nauseas e escuridão)
      prison:
        duracao_ticks: 140
        
      # Teleporte (Surpresa)
      teleport:
        range: 35
        focus_duration_ms: 8000 # Tempo de foco forçado após teleporte
    
    # IA Avançada - Pesos de targeting
    ai_targeting:
      weights:
        dps: 50
        fleeing: 40
        healer: 30
        proximity: 10
        low_hp_penalty: -10
      ranges:
        close: 12
        mid: 25
        far: 60

    # Efeitos Visuais e Sonoros
    visual_effects:
      scale: 2.2  # 120% maior que o tamanho original
      equipment:
        helmet: "GOLDEN_HELMET"
        weapon: "GOLDEN_SWORD"
      aura:
        flame: 15        # Partículas de chama (tema fogo real)
        smoke: 8         # Fumaça (poder)
        soul: 5          # Alma azul (influência de Indrax)
        interval_ticks: 4  # Spawna a cada 4 ticks (5x por segundo)
      skill_particles:
        jump_attack:
          explosion: 30
          cloud: 50      # Poeira real
          crit: 20       # Faíscas douradas
        meteor_rain:
          lava: 10
          flame: 15
          soul: 5        # Mix com Indrax
        royal_roar:
          sonic_boom: 1
          dust_gold: 30
        throne_flame:
          flame: 20
          soul_fire_flame: 15
        
      # Repelir (Afasta jogadores)
      repel:
        raio: 12
        forca: 3.0
        
      # Puxar (Atrai jogadores)
      pull:
        raio: 22
        forca: 2.5

      # [NOVO] Rugido do Soberano (Onda de choque)
      royal_roar:
        dano: 18.0
        raio: 18
        weakness_duration: 120
        nausea_duration: 60

      # [NOVO] Chama do Trono (Anel de fogo)
      throne_flame:
        dano_dentro: 8.0
        dano_fora: 14.0
        raio_interno: 8
        raio_externo: 16
        fire_ticks: 300 # 15 segundos de chamas

      # [NOVO] Decreto Real (Marca um traidor)
      royal_decree:
        glowing_duration: 200
        reflect_percent: 0.7 # 70% de reflexão de dano
        slowness_allies_duration: 100
        raio_aliados: 12

  # ################################################
  # INDRAX ABISSAL - O Pesadelo das Sombras
  # ################################################
  indrax:
    nome: "&5&lIndrax Abissal"
    hp: 14000.0
    normal_damage: 25.0 # Dano do ataque corpo a corpo

    dialogues:
      spawn:
        - "§5§lINDRAX: §dO Pilar do Vazio me corrompeu... e agora, eu consumo tudo para restaurar o silêncio."
        - "§5§lINDRAX: §dEu não desejo poder — desejo silêncio. E vocês... são barulhentos demais."
        - "§5§lINDRAX: §dA energia caótica infiltrou o vazio puro. Cada vez que acordo, tento consumir a realidade."
      kill_player:
        - "§5§lINDRAX: §dO vazio é paz absoluta. Agora você conhece o silêncio que eu protejo."
        - "§5§lINDRAX: §dVocê lutou contra uma criatura em desespero... e perdeu."
    
    skills:
      cooldown_base: 4500
      cooldown_rage: 2000
      
      # Pulso do Vazio (Dano periódico na aura)
      pulso:
        dano: 6.0
        raio: 16
        interval_ticks: 40 # A cada 2 segundos
        
      # Dreno de Almas (Cura o boss e fere jogadores)
      dreno:
        dano: 18.0
        cura_boss: 200.0
        raio: 14
        
      # Singularidade (Atrai jogadores e explode)
      singularidade:
        dano: 20.0
        raio: 22
        pull_force: 2.5
        pull_y: 0.8
        
      # Fúria Abissal (Buffs para o boss)
      rage:
        nivel_forca: 3
        duracao_ticks: 200
        
      # Apagar do Vazio (Wither forte)
      void_erase:
        raio: 16
        wither_duration: 200
        wither_level: 3
        
      # Paralisia Escura (Slow + Blindness)
      dark_paralysis:
        raio: 18
        slow_duration: 160
        slow_level: 5
        blind_duration: 200
        
      # Colapso do Abismo (Levitação) - NERFADO
      abyss_collapse:
        raio: 22
        levitation_duration: 50
        levitation_level: 2
        # Velocity removido para reduzir dano de queda
        
      # Contaminação (Blocos de Sculk)
      contamination:
        radius_spawn: 16
        radius_periodic: 12
        chance: 0.5

      # Quantidades de minions por threshold
      minions:
        count_75: 8
        count_50: 12
        count_25: 16

    # Efeitos Visuais e Sonoros
    visual_effects:
      scale: 2.0  # 100% maior que o tamanho original (gigante das sombras)
      aura:
        sculk_soul: 12       # Partículas de alma sculk (tema abismo)
        vibration: 6         # Vibração do Warden
        end_rod: 3           # Brilho dourado sutil (influência de Gorvax)
        smoke_large: 4       # Névoa aos pés
        interval_ticks: 4    # Spawna a cada 4 ticks (5x por segundo)
      skill_particles:
        abyss_collapse:
          sonic_boom: 10     # Vácuo visual
          smoke_large: 20    # Aspirado para cima
          reverse_portal: 15
        dark_paralysis:
          smoke: 15
          sculk_soul: 10
          end_rod: 5         # Mix com Gorvax
        void_erase:
          reverse_portal: 25
          soul: 15
          end_rod: 8         # Mix com Gorvax
        singularity:
          sonic_boom: 3
          sculk_charge: 20

  # ################################################
  # IA - Configurações de Targeting
  # ################################################
  ai:
    anti_kite:
      chance: 0.15
      range: 25
    threat:
      dps_weight: 40
      fleeing_weight: 30
      healer_weight: 20
      low_hp_penalty: -10
      proximity_weight: 10

  # ================================================
  # ZARITH — Presa da Selva (Spider, T2-5)
  # ================================================
  zarith:
    nome: "&a&lZar'ith, a Presa da Selva"
    hp: 3000.0
    normal_damage: 14.0

    dialogues:
      spawn:
        - "§a§lZAR'ITH: §2A floresta é meu território de caça. O Pilar rachado me despertou... e estou faminta."
        - "§a§lZAR'ITH: §2Há milênios eu dormia no subsolo. As vibrações do desequilíbrio me acordaram."
      kill_player:
        - "§a§lZAR'ITH: §2A presa jamais escapa das teias ancestrais."
    movement_speed: 0.38

    visual_effects:
      scale: 1.8
      aura:
        slime: 8
        smoke: 4

    skills:
      cooldown_base: 6500
      cooldown_rage: 4000

      poison_web:
        raio: 12.0
        dano: 8.0
        poison_duration: 140
        slow_duration: 120

      predator_leap:
        raio: 6.0
        dano: 14.0
        knockback: 2.0

      ambush:
        range: 25
        dano: 12.0
        focus_duration_ms: 5000

      toxic_burst:
        raio: 14.0
        dano: 10.0
        wither_duration: 120

      frenzy:
        duracao_ticks: 160
        speed_level: 2
        strength_level: 1

      minions:
        count_75: 4
        count_50: 6
        count_25: 8

  # ================================================
  # KALDUR — Coração de Gelo (Stray, T2-4)
  # ================================================
  kaldur:
    nome: "&b&lKaldur, o Coração de Gelo"
    hp: 4000.0
    normal_damage: 16.0
    movement_speed: 0.30

    dialogues:
      spawn:
        - "§b§lKALDUR: §3Eu era mortal, um arqueiro dos picos gelados. A tempestade sobrenatural me transformou."
        - "§b§lKALDUR: §3O eco do desequilíbrio dos Pilares me congelou e me renasceu. Eu sou o inverno encarnado."
      kill_player:
        - "§b§lKALDUR: §3Os monges de Glacius tentaram canalizar meu poder. Todos congelaram. Assim como você."

    visual_effects:
      scale: 1.8
      aura:
        snowflake: 10
        end_rod: 4

    skills:
      cooldown_base: 6500
      cooldown_rage: 4000

      frost_aura:
        raio: 10.0
        dano: 4.0

      blizzard:
        raio: 18.0
        dano: 10.0
        slow_duration: 140

      ice_lance:
        dano: 14.0

      glacial_prison:
        duracao_ticks: 80

      frost_shield:
        duracao_ticks: 180
        resistance_level: 3

      ice_storm:
        raio: 20.0
        dano: 14.0

      minions:
        count_75: 4
        count_50: 6
        count_25: 10

  # ================================================
  # SKULKOR — General Reerguido (Skeleton, T2-3)
  # ================================================
  skulkor:
    nome: "&7&lSkulkor, o General Reerguido"
    hp: 5000.0
    normal_damage: 18.0

    dialogues:
      spawn:
        - "§7§lSKULKOR: §8O poder do Pilar de Chamas reanimou meus ossos. Meu exército marcha novamente."
        - "§7§lSKULKOR: §8Eu caí em batalha séculos atrás. Agora busco uma guerra que já acabou... ou será que não?"
      kill_player:
        - "§7§lSKULKOR: §8A morte caminha atrás de todos. Para você, ela chegou hoje."
    movement_speed: 0.32

    visual_effects:
      scale: 1.9
