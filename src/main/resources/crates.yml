# =============================================
# GorvaxCore — B12: Configuração de Crates
# =============================================
# Cada tipo de crate tem uma lista de rewards.
# Cada reward tem um "peso" (weight) — quanto maior, mais provável.
# Tipos de reward: money, claim_blocks, item, custom_item, title, crate_key

crates:
  comum:
    name: "§f§lCrate Comum"
    icon: CHEST
    color: "§f"
    broadcast_on_open: false
    rewards:
      - type: money
        amount: 100
        weight: 30
        display: "§a$100"
      - type: money
        amount: 250
        weight: 20
        display: "§a$250"
      - type: claim_blocks
        amount: 50
        weight: 25
        display: "§e50 Blocos"
      - type: claim_blocks
