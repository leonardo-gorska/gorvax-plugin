# ============================================================
# GorvaxCore — Mini-Bosses por Bioma (B11)
# Bosses menores que spawnam naturalmente em biomas específicos.
# ============================================================

# Configurações globais
settings:
  enabled: true
  spawn_interval: 2400           # Intervalo de tentativa de spawn em ticks (2400 = 2 minutos)
  max_active: 3                  # Máximo de mini-bosses ativos simultâneos
  distance_from_claims: 100      # Distância mínima de claims para spawn natural (blocos)
  player_spawn_radius: 80        # Raio de spawn ao redor de jogadores (blocos)
  player_min_radius: 30          # Distância mínima do jogador para spawn (blocos)
  despawn_time: 6000             # Ticks sem combate antes de despawnar (6000 = 5 minutos)
  spawn_chance: 0.08             # Chance de spawn por tentativa (0.0 a 1.0) — era 0.35

# Definições de mini-bosses
mini_bosses:

  guardiao_deserto:
    nome: "§6§lGuardião do Deserto"
    entity_type: HUSK
    hp: 250.0                       # era 300.0
    damage: 10.0                     # era 8.0
    scale: 1.4                       # era 1.5
    movement_speed: 0.30             # era 0.28
    money_reward: 500.0
    xp_reward: 150
    biomes:
      - DESERT
      - BADLANDS
      - ERODED_BADLANDS
      - WOODED_BADLANDS
    equipment:
      helmet: GOLDEN_HELMET
      chestplate: GOLDEN_CHESTPLATE
      leggings: GOLDEN_LEGGINGS
      boots: GOLDEN_BOOTS
      mainhand: GOLDEN_SWORD
    effects_on_hit:
      - "SLOWNESS:40:1"             # era 60:1
      - "HUNGER:60:1"               # era 100:1
    passive_effects:
      - "FIRE_RESISTANCE:999999:0"
    skills:
      sand_storm:
        radius: 8.0                  # era 10.0
        damage: 5.0                  # era 4.0
        cooldown: 10000              # era 8000
        message: "§6§lGUARDIÃO §8» §eA tempestade de areia consome tudo!"
      summon_minions:
        count: 2                     # era 3
        type: HUSK
        name: "§6Servo do Deserto"
        hp_threshold: 0.4            # era 0.5
    loot:
