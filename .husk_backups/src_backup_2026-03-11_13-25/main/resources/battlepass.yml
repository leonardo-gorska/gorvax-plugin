# ============================================
# B15 — Battle Pass Sazonal
# ============================================
# Temporada de 30 dias com 30 níveis.
# Track Free (todos) + Track Premium (comprado na loja).

# Se o sistema está habilitado
enabled: true

# Informações da temporada atual
season:
  number: 1
  name: "§6⚔ Temporada 1 — Ascensão"
  # Duração em dias
  duration_days: 30
  # Data de início (formato: dd/MM/yyyy)
  # Se vazio, inicia automaticamente ao carregar
  start_date: ""

# XP ganho por ação
xp_sources:
  kill_player: 50
  kill_mob: 2
  mine_block: 1
  boss_kill: 200
  boss_top_damage: 100
  daily_claim: 30
  login: 15
  quest_daily: 40
  quest_weekly: 150
  duel_win: 75

# XP necessário por nível (base + incremento por nível)
xp_per_level:
  base: 150
  increment: 30
  # Nível 1 = 150 XP, Nível 2 = 180 XP, ..., Nível 30 = 1020 XP

