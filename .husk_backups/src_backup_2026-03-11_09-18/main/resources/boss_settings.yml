        - "§5§lXYLOS: §dNinguém sabe se eu vim do End ou se sempre estive lá. O Pilar do Vazio vazou... e eu apareci."
        - "§5§lXYLOS: §dAlguns dizem que sou um fragmento do próprio Pilar que ganhou consciência. Talvez tenham razão."
      kill_player:
        - "§5§lXYLOS: §dO espaço ao redor é apenas papel para mim. Você foi rasgado junto."

    visual_effects:
      scale: 2.0
